# Medium config — better quality, still fits 32 GB (~350M params)
model:
  vocab_size: 16384
  n_layers: 24
  n_heads: 16
  d_model: 1024
  d_ffn: 2730
  max_seq_len: 2048
  dropout: 0.1
  rope_theta: 10000.0

train:
  batch_size: 2
  grad_accum: 8
  lr: 2.0e-4
  lr_schedule: cosine
  warmup_steps: 2000
  max_steps: 200000
  grad_clip: 1.0
  weight_decay: 0.1
  dtype: float32
  save_every: 2000
  seed: 42

inference:
  max_new_tokens: 200
  temperature: 0.8
  top_k: 0
  top_p: 0.9
  repetition_penalty: 1.0
  device: cpu
  dtype: int8
